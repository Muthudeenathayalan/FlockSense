name: flock_sense
description: "FlockSense poultry farm management application."
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3

  # Authentication
  google_sign_in: ^7.2.0

  # State Management
  flutter_riverpod: ^3.3.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.20.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true